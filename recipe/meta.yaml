{% set name = "pdm-pep517" %}
{% set version = "1.1.4" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 7f49121e70b42dca296fac962210dd2da07a39575fc5673137ad661633b2cf3f

build:
  number: 1
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<37]

requirements:
  host:
    - pip
    - python
    - wheel
  run:
    - python
    # https://github.com/pdm-project/pdm-backend/blob/1.1.4/pdm/pep517/api.py#L27
    - setuptools >=40.8.0

# >   tag in supported_tags
#     ), f"would build wheel with unsupported tag {tag}"
# E   AssertionError: would build wheel with unsupported tag ('cp313', 'cp313_win_amd64', 'win_amd64')
{% set deselect_tests = "" %}
{% set deselect_tests = " --deselect=tests/test_api.py::test_build_with_cextension" %}  # [win and py>=313]
{% set deselect_tests = deselect_tests + " --deselect=tests/test_api.py::test_build_with_cextension_in_src" %}  # [win and py>=313]

test:
  source_files:
    - tests
  imports:
    - pdm.pep517
    - pdm.pep517.base
    - pdm.pep517.editable
    - pdm.pep517.exceptions
    - pdm.pep517.macosx_platform
    - pdm.pep517.metadata
    - pdm.pep517.scm
    - pdm.pep517.sdist
    - pdm.pep517.utils
    - pdm.pep517.validator
    - pdm.pep517.version
    - pdm.pep517.wheel
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    - pytest -v tests {{ deselect_tests }}
  requires:
    - pip
    - pytest
    - git # used by tests

about:
  home: https://pypi.org/project/pdm-pep517
  dev_url: https://github.com/pdm-project/pdm-pep517
  doc_url: https://github.com/pdm-project/pdm-pep517/blob/master/README.md
  summary: A PEP 517 backend for PDM that supports PEP 621 metadata
  description: |
    This is the backend for PDM projects, but you can also
    use it alone. It reads the metadata of PEP 621 format and
    converts it to Core metadata.
  license: MIT
  license_family: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - hadim
  skip-lints:
    - python_build_tool_in_run
